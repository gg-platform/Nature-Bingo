<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a5c31">
    <title>Bingo Player - Spotted on site</title>
    <link rel="icon" type="image/x-icon" href="https://www.gotgreens.farm/favicon.ico">
    <link rel="stylesheet" href="player-styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <img src="https://static.wixstatic.com/media/5ada6d_6b1f0968ab684579b90bf8de4fce0a05~mv2.png/v1/crop/x_0,y_246,w_4961,h_3016/fill/w_204,h_124,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/New%20Logo%20White.png" alt="Logo" class="app-logo">
            <h1>Your Bingo Board</h1>
            <button class="btn-icon-only" id="newBoardBtn" title="New Board">🔄</button>
        </header>

        <main class="main-content">
            <div id="bingoBoard" class="bingo-board"></div>
        </main>

        <footer class="app-footer">
            <div class="stats-row">
                <div class="stat">
                    <span class="stat-label">Marked</span>
                    <span class="stat-value" id="markedCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Remaining</span>
                    <span class="stat-value" id="remainingCount">25</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Bingo Modal -->
    <div id="bingoModal" class="modal">
        <div class="modal-content">
            <div class="bingo-animation">
                <div class="confetti"></div>
                <h2>🎉 BINGO! 🎉</h2>
                <p>You got 5 in a row!</p>
                <button class="btn btn-primary" id="playAgainBtn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
